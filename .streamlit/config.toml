# Streamlit Community Cloud Configuration (Section 7.2 - Hosting Compatible)
# Purpose: Optimize Streamlit app for hosting platforms (Streamlit Cloud, HF Spaces, Render)

[theme]
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true
allowRunOnSave = false
runOnSave = false

# Performance optimization for hosted environments
maxUploadSize = 200
maxMessageSize = 200

[logger]
level = "info"

[browser]
gatherUsageStats = false
serverAddress = "localhost"

# Timeout settings for cloud environments
[client.toolbarMode]
startMode = "minimal"